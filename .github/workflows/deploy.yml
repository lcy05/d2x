name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          TF=$(printf '%s' "${{ secrets.CF_API_TOKEN }}" | tr -d '\n\r ')
          CLOUDFLARE_API_TOKEN="$TF" npx wrangler pages deploy . --project-name=d2x --branch=master