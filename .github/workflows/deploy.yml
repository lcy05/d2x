name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify token
        run: curl -s -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" "https://api.cloudflare.com/client/v4/user/tokens/verify"
      - run: npx wrangler@3 pages deploy . --project-name=d2x --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
